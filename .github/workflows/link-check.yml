name: Broken Link Check

on:
  schedule:
    # Every Monday at 09:00 KST (00:00 UTC)
    - cron: '0 0 * * 1'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'src/**'
      - 'blog/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check external links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --cache
            --max-cache-age 1d
            --timeout 20
            --max-retries 3
            --scheme https
            --scheme http
            --accept 200,204,301,403,429
            --exclude "^\."
            --exclude "^/"
            --exclude-all-private
            --exclude "^https://localhost"
            --exclude "^http://localhost"
            --exclude "^https://127\."
            --exclude "^https://github\.com/suidevgru/.*/(edit|blob|tree)/main"
            --header "User-Agent: Mozilla/5.0 (compatible; lychee/2.0)"
            './docs/**/*.md'
            './docs/**/*.mdx'
            './i18n/**/*.md'
            './i18n/**/*.mdx'
            './src/**/*.tsx'
            './src/**/*.ts'
            './docusaurus.config.ts'
          fail: false
          output: /tmp/lychee-report.md

      - name: Create GitHub issue on failure (scheduled run)
        if: |
          github.event_name == 'schedule' &&
          steps.lychee.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('/tmp/lychee-report.md', 'utf8');
            } catch {
              report = 'Could not read link check report.';
            }

            const title = `🔗 Broken links detected (${new Date().toISOString().split('T')[0]})`;

            // Check for existing open issue with same title prefix
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
            });

            const existing = issues.find(i => i.title.startsWith('🔗 Broken links detected'));
            if (existing) {
              // Update existing issue body
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## Broken Link Report\n\nDetected by scheduled link check on ${new Date().toUTCString()}\n\n${report}`,
              });
              core.notice(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['broken-links'],
                body: `## Broken Link Report\n\nDetected by scheduled link check on ${new Date().toUTCString()}\n\n${report}`,
              });
            }

      - name: Fail PR if broken links found
        if: |
          github.event_name == 'pull_request' &&
          steps.lychee.outputs.exit_code != '0'
        run: |
          echo "::error::Broken external links detected. Please fix them before merging."
          cat /tmp/lychee-report.md
          exit 1

      - name: Print summary
        if: always()
        run: |
          echo "## 🔗 Link Check Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/lychee-report.md ]; then
            cat /tmp/lychee-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No broken links found ✅" >> $GITHUB_STEP_SUMMARY
          fi
